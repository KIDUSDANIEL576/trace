<!--
  Trace — sign-in code email.
  This is the body Supabase sends for the "Magic Link" auth email. Trace signs
  in with a 6-digit CODE (not a tappable link), so the important token is
  {{ .Token }}. Do NOT remove it — without it, no one can ever sign in.
  Email clients strip <style> and ignore most CSS, so everything here is inline
  and table-based on purpose. Keep it that way.
-->
<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  style="background-color:#0c0b10;margin:0;padding:32px 0;"
>
  <tr>
    <td align="center">
      <table
        role="presentation"
        width="100%"
        cellpadding="0"
        cellspacing="0"
        style="max-width:420px;background-color:#16151c;border:1px solid rgba(255,255,255,0.08);border-radius:24px;"
      >
        <tr>
          <td style="padding:36px 36px 8px 36px;">
            <div
              style="font-family:'Caveat',cursive,Georgia,serif;font-size:34px;font-weight:700;color:#f3f0f4;line-height:1;"
            >
              tra<span style="color:#e23343;">ce</span>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding:12px 36px 0 36px;">
            <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:15px;color:#9a93a5;line-height:22px;">
              Here’s your sign-in code. Type it into the app to leave your person a trace.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 36px 4px 36px;">
            <div
              style="background-color:#1d1b24;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 0;text-align:center;font-family:'Courier New',monospace;font-size:38px;font-weight:700;letter-spacing:10px;color:#f3f0f4;"
            >
              {{ .Token }}
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 36px 0 36px;">
            <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#9a93a5;line-height:20px;">
              This code expires in an hour. If you didn’t ask to sign in to Trace, you can ignore
              this email — nothing will happen.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:28px 36px 36px 36px;">
            <p style="margin:0;font-family:'Caveat',cursive,Georgia,serif;font-size:18px;color:#9a93a5;">
              made for two.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
